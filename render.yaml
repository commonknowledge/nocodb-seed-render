services:
- type: web
  name: nocodb-application
  env: docker
  autoDeploy: false
  healthCheckPath: /dashboard
  region: frankfurt
  plan: standard
  envVars:
  - key: DATABASE_URL
    fromDatabase:
      name: xc
      property: connectionString
  - key: PORT
    value: 8080
databases:
- name: nocodb-database
